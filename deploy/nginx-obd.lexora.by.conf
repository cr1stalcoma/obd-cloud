# OBD Cloud API — add to existing nginx on VPS (lexora.by host)
# certbot: certbot certonly --nginx -d obd.lexora.by

server {
    listen 80;
    server_name obd.lexora.by;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name obd.lexora.by;

    # Adjust paths to your certbot certificates
    ssl_certificate     /etc/letsencrypt/live/obd.lexora.by/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/obd.lexora.by/privkey.pem;

    client_max_body_size 1m;

    location / {
        proxy_pass http://127.0.0.1:8100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 180s;
    }
}
